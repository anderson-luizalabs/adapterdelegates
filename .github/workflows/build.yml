name: Build

on: [ push, pull_request ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Install JDK 21
        uses: actions/setup-java@v1
        with:
          java-version: 21

      - name: Build
        run: ./gradlew build --stacktrace
